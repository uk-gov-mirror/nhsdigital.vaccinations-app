name: "Snapshot Tests - Named Tag (Preprod)"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to run snapshot tests against'
        type: string
        required: true

env:
  AWS_REGION: eu-west-2

jobs:

  #################################################
  # Set up metadata for the jobs
  #################################################

  metadata:
    name: "Set CI/CD metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      test_app_url: ${{ steps.variables.outputs.test_app_url }}
    environment:
      name: "preprod"
    steps:
      - name: "Set CI/CD variables"
        id: variables
        shell: bash
        run: |
          echo "test_app_url=${{ vars.TEST_APP_URL_MAIN }}" | tee -a $GITHUB_OUTPUT

  run-snapshot-tests:
    name: "Snapshot tests"
    runs-on: "ubuntu-latest"
    needs: [ metadata ]
    timeout-minutes: 30
    concurrency:
      group: "preprod-env"
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    environment:
      name: "preprod"

    steps:
      - name: "Checkout code for metadata"
        uses: actions/checkout@v6

      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-session-name: GitHubActionsSession
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Get tag name of deployed version in Preprod"
        id: deployed-version-tag
        timeout-minutes: 5
        shell: bash
        run: |
          APP_VERSION=$(aws lambda get-function-configuration --function-name gh-vita-${{ secrets.AWS_ACCOUNT_ID }}-server-function | jq -r '.Environment.Variables.APP_VERSION')
          echo "value=$APP_VERSION" | tee -a $GITHUB_OUTPUT

      - name: "Check deployed version is expected tag"
        shell: bash
        run: |
          if  [[ "${{ steps.deployed-version-tag.outputs.value }}" != "${{ inputs.release_tag }}" ]]; then
            echo "Exiting; deployed build ${{ steps.deployed-version-tag.outputs.value }} is not the expected build ${{ inputs.release_tag }}"
            exit 1
          fi

      - name: "Run snapshot tests on ${{ steps.deployed-version-tag.outputs.value }} (preprod)"
        uses: ./.github/actions/run-snapshot-tests
        with:
          checkout_ref: ${{ steps.deployed-version-tag.outputs.value }}
          release_name: ${{ inputs.release_tag }}
        env:
          SECRET_IAM_ROLE: ${{ secrets.IAM_ROLE }}
          TEST_NHS_APP_URL: ${{ secrets.TEST_NHS_APP_URL }}
          TEST_NHS_LOGIN_PASSWORD: ${{ secrets.TEST_NHS_LOGIN_PASSWORD }}
          TEST_NHS_LOGIN_OTP: ${{ secrets.TEST_NHS_LOGIN_OTP }}
          TEST_APP_URL:  ${{ needs.metadata.outputs.test_app_url }}
          VITA_TEST_USER_PATTERN: ${{ secrets.VITA_TEST_USER_PATTERN }}
          AWS_S3_ARTEFACTS_BUCKET: vita-${{ secrets.AWS_ACCOUNT_ID }}-artefacts-preprod
